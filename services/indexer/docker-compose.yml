services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-Kovara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Kovara}
      POSTGRES_DB: ${POSTGRES_DB:-Kovara}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-Kovara}"]
      interval: 5s
      timeout: 5s
      retries: 10

  indexer:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-Kovara}:${POSTGRES_PASSWORD:-Kovara}@postgres:5432/${POSTGRES_DB:-Kovara}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
