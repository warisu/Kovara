<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Token - Kovara Mini App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        width: 100%;
        max-width: 440px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 28px;
      }

      h1 {
        font-size: 24px;
        line-height: 1.2;
        margin-bottom: 6px;
      }

      .subtitle {
        color: #94a3b8;
        font-size: 14px;
        margin-bottom: 24px;
      }

      .panel {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .label {
        color: #64748b;
        display: block;
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .value {
        color: #f8fafc;
        font-size: 15px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .balance {
        color: #a7f3d0;
        font-size: 30px;
        font-weight: 800;
        margin-top: 4px;
      }

      label {
        color: #94a3b8;
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 44px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        color: #f8fafc;
        font-size: 15px;
        margin-bottom: 14px;
        padding: 10px 12px;
      }

      input:focus {
        border-color: #6366f1;
        outline: none;
      }

      button {
        width: 100%;
        min-height: 48px;
        background: #6366f1;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-size: 15px;
        font-weight: 800;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      #status {
        display: none;
        margin-top: 14px;
        border-radius: 10px;
        padding: 12px;
        font-size: 13px;
      }

      #status.info {
        display: block;
        background: #1e3a5f;
        color: #bfdbfe;
      }
      #status.success {
        display: block;
        background: #14532d;
        color: #bbf7d0;
      }
      #status.error {
        display: block;
        background: #450a0a;
        color: #fecaca;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Creator Token</h1>
      <p class="subtitle">Check your creator-token balance and send a tip.</p>

      <section class="panel">
        <span class="label">Creator</span>
        <div id="creator" class="value">Loading...</div>
      </section>

      <section class="panel">
        <span class="label">Token balance</span>
        <div id="balance" class="balance">--</div>
      </section>

      <label for="tip-amount">Tip amount</label>
      <input id="tip-amount" type="number" min="0.0000001" step="0.1" value="1" />

      <button id="tip-button" type="button" onclick="sendTip()" disabled>Tip Creator</button>

      <div id="status"></div>
    </main>

    <script>
      const HORIZON_URL = "https://horizon-testnet.stellar.org";

      const SDK = window.KovaraSDK || {
        wallet: {
          getAddress: async () => "GAAZI4TCR3TY5OJHCTJC2A4QSY6CJWJH5IAJTGKIN2ER7LBNVKOCCWN",
          signTransaction: async (txXdr) => {
            console.log("[mock] signTransaction", txXdr);
            return { signedTxXdr: txXdr };
          },
        },
        profile: {
          get: async () => ({
            username: "maya",
            address: "GCKFBEIYTKP6RCZNVPH73XL7XFWTEOAO4MKONX7HOILHDVBMW5EVPOPZ",
            creatorToken: {
              code: "MAYA",
              issuer: "GCKFBEIYTKP6RCZNVPH73XL7XFWTEOAO4MKONX7HOILHDVBMW5EVPOPZ",
            },
          }),
        },
      };

      let walletAddress = null;
      let profile = null;
      let token = null;

      async function init() {
        try {
          showStatus("Loading profile and token balance...", "info");
          walletAddress = await SDK.wallet.getAddress();
          profile = await SDK.profile.get();
          token = normalizeCreatorToken(profile.creatorToken);

          document.getElementById("creator").textContent =
            (profile.username ? "@" + profile.username : profile.address) + " / " + token.label;

          const balance = await fetchTokenBalance(walletAddress, token);
          document.getElementById("balance").textContent = balance + " " + token.code;
          document.getElementById("tip-button").disabled = false;
          showStatus("Ready", "success");
        } catch (err) {
          showStatus(err.message || String(err), "error");
        }
      }

      function normalizeCreatorToken(rawToken) {
        if (!rawToken) {
          throw new Error("Creator profile does not include a creator token.");
        }

        if (typeof rawToken === "string") {
          return {
            code: rawToken === "native" ? "XLM" : rawToken,
            issuer: null,
            label: rawToken,
          };
        }

        return {
          code: rawToken.code || rawToken.assetCode || "TOKEN",
          issuer: rawToken.issuer || rawToken.assetIssuer || null,
          label: rawToken.code || rawToken.assetCode || "Creator token",
        };
      }

      async function fetchTokenBalance(accountId, tokenInfo) {
        const response = await fetch(HORIZON_URL + "/accounts/" + encodeURIComponent(accountId));

        if (!response.ok) {
          throw new Error("Could not load balance from Stellar Horizon.");
        }

        const account = await response.json();
        const balanceLine = account.balances.find((line) => {
          if (tokenInfo.code === "XLM") return line.asset_type === "native";
          return (
            line.asset_code === tokenInfo.code &&
            (!tokenInfo.issuer || line.asset_issuer === tokenInfo.issuer)
          );
        });

        return balanceLine ? balanceLine.balance : "0";
      }

      async function sendTip() {
        const amount = Number(document.getElementById("tip-amount").value);
        if (!amount || amount <= 0) {
          showStatus("Enter a tip amount greater than zero.", "error");
          return;
        }

        const button = document.getElementById("tip-button");
        button.disabled = true;
        button.textContent = "Waiting for signature...";

        try {
          const txXdr = JSON.stringify({
            type: "creator-token-tip",
            from: walletAddress,
            to: profile.address,
            token,
            amount: String(amount),
          });

          await SDK.wallet.signTransaction(txXdr);
          showStatus("Tip signed successfully.", "success");
        } catch (err) {
          showStatus("Tip rejected or failed: " + (err.message || err), "error");
        } finally {
          button.disabled = false;
          button.textContent = "Tip Creator";
        }
      }

      function showStatus(message, type) {
        const status = document.getElementById("status");
        status.textContent = message;
        status.className = type;
      }

      init();
    </script>
  </body>
</html>
