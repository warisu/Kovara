<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Jar — Kovara Mini App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: #1e293b;
        border-radius: 16px;
        padding: 32px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
        color: #f1f5f9;
      }

      .subtitle {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 28px;
      }

      .wallet-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: #0f172a;
        border-radius: 10px;
        border: 1px solid #334155;
      }

      .wallet-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #64748b;
        flex-shrink: 0;
      }
      .wallet-dot.connected {
        background: #22c55e;
      }

      #wallet-address {
        font-size: 13px;
        color: #94a3b8;
        font-family: monospace;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 10px 14px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #f1f5f9;
        font-size: 14px;
        margin-bottom: 16px;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus {
        border-color: #6366f1;
      }
      input::placeholder {
        color: #475569;
      }

      .amount-row {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }
      .amount-row input {
        margin-bottom: 0;
        flex: 1;
      }

      .preset-btn {
        padding: 10px 14px;
        background: #334155;
        border: none;
        border-radius: 8px;
        color: #94a3b8;
        font-size: 13px;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        white-space: nowrap;
      }
      .preset-btn:hover {
        background: #475569;
        color: #f1f5f9;
      }

      .tip-btn {
        width: 100%;
        padding: 14px;
        background: #6366f1;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      .tip-btn:hover:not(:disabled) {
        background: #4f46e5;
      }
      .tip-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #status {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px;
        display: none;
      }
      #status.info {
        background: #1e3a5f;
        color: #93c5fd;
        display: block;
      }
      #status.success {
        background: #14532d;
        color: #86efac;
        display: block;
      }
      #status.error {
        background: #450a0a;
        color: #fca5a5;
        display: block;
      }

      .divider {
        height: 1px;
        background: #1e293b;
        margin: 20px 0;
        border: none;
      }

      .tx-hash {
        font-family: monospace;
        font-size: 11px;
        color: #64748b;
        word-break: break-all;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🫙 Tip Jar</h1>
      <p class="subtitle">Send XLM tips to any Kovara post</p>

      <!-- Wallet status -->
      <div class="wallet-row">
        <div class="wallet-dot" id="wallet-dot"></div>
        <span id="wallet-address">Not connected</span>
      </div>

      <!-- Post ID -->
      <label for="post-id">Post ID</label>
      <input id="post-id" type="text" placeholder="e.g. 42" inputmode="numeric" />

      <!-- Amount -->
      <label>Amount (XLM)</label>
      <div class="amount-row">
        <input id="amount" type="number" placeholder="0.00" min="0.0000001" step="0.1" />
        <button class="preset-btn" onclick="setAmount(1)">1</button>
        <button class="preset-btn" onclick="setAmount(5)">5</button>
        <button class="preset-btn" onclick="setAmount(10)">10</button>
      </div>

      <button class="tip-btn" id="tip-btn" onclick="sendTip()" disabled>
        Connect wallet to tip
      </button>

      <div id="status"></div>
    </div>

    <script>
      // ── KovaraSDK bridge ──────────────────────────────────────────────────
      // When running inside the Kovara mobile app the host injects
      // window.KovaraSDK.  Outside the app we fall back to a mock so the
      // page is still usable for development / testing.

      const SDK = window.KovaraSDK || {
        wallet: {
          getAddress: async () => {
            // Dev fallback — returns a dummy Stellar address
            return "GAAZI4TCR3TY5OJHCTJC2A4QSY6CJWJH5IAJTGKIN2ER7LBNVKOCCWN";
          },
          signTransaction: async (txXdr) => {
            // Dev fallback — echoes the XDR back as if signed
            console.log("[mock] signTransaction called with:", txXdr);
            return { signedTxXdr: txXdr };
          },
        },
      };

      // ── State ──────────────────────────────────────────────────────────────
      let walletAddress = null;

      // ── Init ───────────────────────────────────────────────────────────────
      async function init() {
        try {
          walletAddress = await SDK.wallet.getAddress();
          updateWalletUI(walletAddress);
        } catch (err) {
          showStatus("Could not get wallet address: " + err.message, "error");
        }
      }

      function updateWalletUI(address) {
        const dot = document.getElementById("wallet-dot");
        const addrEl = document.getElementById("wallet-address");
        const btn = document.getElementById("tip-btn");

        if (address) {
          dot.classList.add("connected");
          addrEl.textContent = address.slice(0, 8) + "…" + address.slice(-6);
          btn.disabled = false;
          btn.textContent = "Send Tip";
        } else {
          dot.classList.remove("connected");
          addrEl.textContent = "Not connected";
          btn.disabled = true;
          btn.textContent = "Connect wallet to tip";
        }
      }

      function setAmount(val) {
        document.getElementById("amount").value = val;
      }

      // ── Send tip ───────────────────────────────────────────────────────────
      async function sendTip() {
        const postId = document.getElementById("post-id").value.trim();
        const amount = parseFloat(document.getElementById("amount").value);

        if (!postId || isNaN(parseInt(postId, 10))) {
          showStatus("Please enter a valid post ID.", "error");
          return;
        }
        if (!amount || amount <= 0) {
          showStatus("Please enter an amount greater than 0.", "error");
          return;
        }
        if (!walletAddress) {
          showStatus("Wallet not connected.", "error");
          return;
        }

        const btn = document.getElementById("tip-btn");
        btn.disabled = true;
        btn.textContent = "Preparing transaction…";
        showStatus("Building tip transaction for post #" + postId + "…", "info");

        try {
          // Build a minimal Stellar payment XDR (placeholder).
          // In production this would be constructed via stellar-sdk using the
          // contract's `tip_post` instruction.
          const txXdr = buildTipTxXdr(walletAddress, postId, amount);

          btn.textContent = "Waiting for signature…";
          showStatus("Please approve the transaction in your wallet.", "info");

          const { signedTxXdr } = await SDK.wallet.signTransaction(txXdr);

          btn.textContent = "Submitting…";
          showStatus("Submitting transaction to the network…", "info");

          // In production: submit signedTxXdr to Horizon / Soroban RPC.
          // Here we simulate a successful submission.
          await new Promise((r) => setTimeout(r, 800));
          const mockHash = "tx_" + Math.random().toString(36).slice(2, 18);

          showStatus(
            "✅ Tip of " +
              amount +
              " XLM sent to post #" +
              postId +
              "!" +
              '<div class="tx-hash">tx: ' +
              mockHash +
              "</div>",
            "success"
          );
          btn.textContent = "Send Another Tip";
        } catch (err) {
          showStatus("Transaction failed: " + (err.message || err), "error");
          btn.textContent = "Send Tip";
        } finally {
          btn.disabled = false;
        }
      }

      /**
       * Builds a placeholder XDR string representing a tip transaction.
       * Replace with real stellar-sdk TransactionBuilder logic in production.
       */
      function buildTipTxXdr(sender, postId, amount) {
        return JSON.stringify({ sender, postId, amount, memo: "Kovara-tip" });
      }

      function showStatus(html, type) {
        const el = document.getElementById("status");
        el.innerHTML = html;
        el.className = type;
      }

      // ── Boot ───────────────────────────────────────────────────────────────
      init();
    </script>
  </body>
</html>
